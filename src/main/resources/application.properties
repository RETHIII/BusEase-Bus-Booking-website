server.port=${PORT:8080}
spring.profiles.active=local

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bus_booking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Defer SQL initialization so it runs after Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT Configuration (256-bit secret key)
jwt.secret=9a67a86c7b9c456287c88b0a9f8f6b61c9e8d7f6e5d4c3b2a10987654321abcd9a67a86c7b9c456287c88b0a9f8f6b61c9e8d7f6e5d4c3b2a10987654321abcd
jwt.expiration=86400000
# Application Configuration
app.base-url=${APP_BASE_URL:http://localhost:8080}

# OAuth 2.0 / OIDC Client Configurations
oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
